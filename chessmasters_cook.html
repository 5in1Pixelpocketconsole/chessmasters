  function makeOnlineController(gameRef, myColor){
    let myTurnColor='w';
    const ctrl={
      myColor,
      gameRef,
      isMyTurn(){ return pos.turn===myColor && !gameOver; },
      sendMove(uci){
        gameRef.child('moves').push({uci, by:myColor, ts:Date.now()});
      },
      onLocalGameOver(){ gameRef.child('status').set('finished'); },
      detach(){ if(this._movesCb) gameRef.child('moves').off('child_added', this._movesCb); }
    };
    // listen for moves
    const seen=new Set();
    ctrl._movesCb = gameRef.child('moves').on('child_added', snap=>{
      const v=snap.val(); if(!v||seen.has(snap.key))return; seen.add(snap.key);
      if(v.by===myColor) return; // our own move, already applied
      // apply remote move
      applyRemoteUci(v.uci);
    });
    // listen for opponent resign/leave
    gameRef.child('status').on('value', snap=>{
      const st=snap.val();
      if(st==='resigned-w' || st==='resigned-b'){
        const loser=st.endsWith('w')?'w':'b';
        if(!gameOver){ gameOver=true; gameResult={title:'Resignation', sub:(loser==='w'?'Black':'White')+' wins', winner:loser==='w'?'b':'w'}; onGameOver(); }
      }
    });
    return ctrl;
  }

  function applyRemoteUci(uci){
    const from=Chess.fromAlg(uci.slice(0,2));
    const to=Chess.fromAlg(uci.slice(2,4));
    const promo=uci.length>4?uci[4]:null;
    const m=legalCache.find(x=>x.from===from && x.to===to && (x.promo||null)===(promo||null));
    if(m){ doMove(m, true); }
  }

  async function startRandom(){
    showOnlineCard('Random pairing', '<span class="spin"></span> Connecting…');
    try{ await loadFirebase(); }
    catch(e){ return onlineUnavailable('random'); }
    // matchmaking: look for an open seat in /lobby, else create one
    const lobby=fbDb.ref('lobby');
    showOnlineCard('Random pairing', '<span class="spin"></span> Searching for an opponent…');
    // transaction to claim a waiting game
    const waitingRef=fbDb.ref('lobby/waiting');
    const myId='p'+Math.random().toString(36).slice(2,9);
    let joinedGameId=null;

    const tx=await waitingRef.transaction(cur=>{
      if(cur && cur.gameId && cur.host!==myId){
        joinedGameId=cur.gameId; return null; // claim it -> clear waiting
      }
      // become host
      const gameId='g'+Math.random().toString(36).slice(2,10);
      return {gameId, host:myId, ts:Date.now()};
    });

    if(joinedGameId){
      // we are the guest -> black
      const gameRef=fbDb.ref('games/'+joinedGameId);
      await gameRef.child('status').set('active');
      startOnlineGame(gameRef, 'b');
      showOnlineCard('Random pairing', 'Matched! You are <b>Black</b>. Opponent moves first.');
    } else {
      // we are host -> white, wait for guest
      const gameId=tx.snapshot.val().gameId;
      const gameRef=fbDb.ref('games/'+gameId);
      showOnlineCard('Random pairing', '<span class="spin"></span> Waiting for an opponent to join…<br><span style="color:var(--txt-faint)">Open this page in another browser/device to test.</span>');
      gameRef.child('status').on('value', snap=>{
        if(snap.val()==='active'){
          startOnlineGame(gameRef, 'w');
          showOnlineCard('Random pairing', 'Opponent joined! You are <b>White</b>. Your move.');
        }
      });
    }
  }

  async function startFriend(create){
    showOnlineCard('Chosen opponent', '<span class="spin"></span> Connecting…');
    try{ await loadFirebase(); }
    catch(e){ return onlineUnavailable('friend'); }
    if(create){
      const code = Math.random().toString(36).slice(2,7).toUpperCase();
      const gameRef=fbDb.ref('rooms/'+code);
      await gameRef.set({status:'waiting', ts:Date.now()});
      showOnlineCard('Chosen opponent',
        `Share this code with your friend:<div style="font-size:30px;font-weight:800;letter-spacing:4px;margin:10px 0;color:var(--accent-2);">${code}</div>`
        +`<span class="spin"></span> Waiting for them to join… You are <b>White</b>.`);
      gameRef.child('status').on('value', snap=>{
        if(snap.val()==='active'){ startOnlineGame(gameRef,'w'); showOnlineCard('Chosen opponent','Friend joined! You are <b>White</b>. Your move.'); }
      });
    } else {
      // join flow handled by prompt UI
      const code=(document.getElementById('joinCode').value||'').trim().toUpperCase();
      if(code.length<4){ toast('Enter a valid code.'); return; }
      const gameRef=fbDb.ref('rooms/'+code);
      const snap=await gameRef.get();
      if(!snap.exists()){ toast('Room not found.'); return; }
      await gameRef.child('status').set('active');
      startOnlineGame(gameRef,'b');
      showOnlineCard('Chosen opponent','Joined room <b>'+code+'</b>! You are <b>Black</b>. Opponent moves first.');
    }
  }

  function startOnlineGame(gameRef, myColor){
    resetGameState();
    mode = (gameRef.toString().includes('/rooms/'))?'friend':'random';
    humanColor=myColor;
    orientation=myColor;
    if(online) online.detach();
    online=makeOnlineController(gameRef, myColor);
    $('setupCard').classList.add('hidden');
    $('gameCard').classList.remove('hidden');
    $('gameCardTitle').textContent = mode==='friend'?'Friend match':'Online match';
    buildBoard(); renderLive(); updatePlayerBars(); updateStatus();
  }

  function onlineUnavailable(which){
    // Firebase not configured — explain and offer local fallback
    const msg = `<div style="margin-bottom:10px;">Online play needs a Firebase connection, which isn't configured in this file yet.</div>`
      +`<div style="color:var(--txt-faint);font-size:12.5px;line-height:1.5;">To enable it: create a free Firebase project, turn on Realtime Database, and paste your config into the <code class="inline">FIREBASE_CONFIG</code> block near the bottom of this file. Full steps are in the code comments.</div>`
      +`<button class="btn primary" id="fallbackLocal" style="margin-top:12px;width:100%;">Play this color locally instead</button>`;
    showOnlineCard(which==='random'?'Random pairing':'Chosen opponent', msg);
    const b=document.getElementById('fallbackLocal');
    if(b) b.onclick=()=>{ startLocalHotseat(); };
  }

  function startLocalHotseat(){
    resetGameState();
    mode='local';
    humanColor='w';
    orientation='w';
    online=null;
    $('onlineCard').classList.add('hidden');
    $('setupCard').classList.add('hidden');
    $('gameCard').classList.remove('hidden');
    $('gameCardTitle').textContent='Local game';
    buildBoard(); renderLive(); updatePlayerBars();
    setStatus('Local game — both sides on this device. White to move.');
  }

  function showOnlineCard(title, html){
    $('onlineCard').classList.remove('hidden');
    $('onlineTitle').textContent=title;
    $('onlineBody').innerHTML=html;
  }

  // ============= GAME SETUP / RESET =============
  function resetGameState(){
    pos=Chess.newGame();
    history=[]; legalCache=pos.legalMoves();
    selected=null; legalForSel=[];
    gameOver=false; gameResult=null; reviewIndex=null; analysisData=null;
    lastMoveSquares=null; thinking=false;
    $('resultBanner').style.display='none';
    $('analysisCard').style.display='none';
    $('evalBar').style.display='none';
    $('moveDetail').style.display='none';
    $('resignBtn').style.display='';
    $('analyzeBtn2').style.display='none';
    $('movesBody').innerHTML='';
  }

  function startComputerGame(){
    resetGameState();
    mode='computer';
    engineLevel=parseInt($('engineLevel').value,10);
    let pa=$('playAs').value;
    if(pa==='r') pa=Math.random()<0.5?'w':'b';
    humanColor=pa;
    orientation=pa;
    if(online){ online.detach(); online=null; }
    $('onlineCard').classList.add('hidden');
    $('setupCard').classList.add('hidden');
    $('gameCard').classList.remove('hidden');
    $('gameCardTitle').textContent = engineLevel>=11 ? 'vs 🔥 BOSS · Stockfish' : 'vs Computer · L'+engineLevel;
    // Warm up Stockfish early so the boss's first move isn't delayed by loading.
    if(engineLevel>=11) SF.init();
    buildBoard(); renderLive(); updatePlayerBars();
    updateStatus();
    if(pos.turn!==humanColor) scheduleComputerMove();
  }

  function resign(){
    if(gameOver) return;
    if(mode==='computer'||mode==='local'){
      gameOver=true;
      const winner=humanColor==='w'?'b':'w';
      gameResult={title:'Resignation', sub:(winner==='w'?'White':'Black')+' wins', winner};
      onGameOver();
    } else if((mode==='random'||mode==='friend') && online){
      online.gameRef.child('status').set('resigned-'+online.myColor);
      gameOver=true;
      const winner=online.myColor==='w'?'b':'w';
      gameResult={title:'Resignation', sub:(winner==='w'?'White':'Black')+' wins', winner};
      onGameOver();
    }
  }

  function newGameToMenu(){
    if(online){ online.detach(); online=null; }
    resetGameState();
    mode=null;
    $('gameCard').classList.add('hidden');
    $('analysisCard').style.display='none';
    $('onlineCard').classList.add('hidden');
    $('setupCard').classList.remove('hidden');
    // reset board to a neutral start preview
    orientation='w';
    buildBoard(); renderLive();
    setStatus('Choose a mode to begin.');
  }

  function flip(){
    orientation = orientation==='w'?'b':'w';
    buildBoard();
    if(reviewIndex!==null && history.length){ gotoMove(reviewIndex); }
    else renderLive();
    if(analysisData) updateEvalBarTo(reviewIndex===null?history.length-1:reviewIndex);
  }

  // ============= MODE BUTTON HANDLING =============
  function selectMode(m){
    // highlight + reveal correct options
    document.querySelectorAll('.mode-btn').forEach(b=>b.style.borderColor=b.dataset.mode===m?'var(--accent)':'var(--border)');
    $('computerOpts').style.display = m==='computer'?'flex':'none';
    if(m==='computer'){ $('onlineCard').classList.add('hidden'); return; }
    if(m==='random'){ startRandom(); }
    if(m==='friend'){ showFriendChoice(); }
  }

  function showFriendChoice(){
    const html=`<div style="margin-bottom:10px;">Play a specific person with a shared room code.</div>`
      +`<button class="btn primary" id="createRoom" style="width:100%;margin-bottom:10px;">Create a room (you're White)</button>`
      +`<div style="display:flex;gap:8px;"><input type="text" id="joinCode" placeholder="Enter code" style="flex:1;text-transform:uppercase;"><button class="btn" id="joinRoom">Join</button></div>`;
    showOnlineCard('Chosen opponent', html);
    document.getElementById('createRoom').onclick=()=>startFriend(true);
    document.getElementById('joinRoom').onclick=()=>startFriend(false);
  }

  // ============= EVENTS =============
  function bindEvents(){
    document.querySelectorAll('.mode-btn').forEach(b=>{
      b.onclick=()=>selectMode(b.dataset.mode);
    });
    $('startComputer').onclick=startComputerGame;
    $('newBtn').onclick=newGameToMenu;
    $('rematchBtn').onclick=()=>{
      if(mode==='computer') startComputerGame();
      else newGameToMenu();
    };
    $('flipBtn').onclick=flip;
    $('resignBtn').onclick=resign;
    $('analyzeBtn').onclick=analyzeGame;
    $('analyzeBtn2').onclick=analyzeGame;
    $('navStart').onclick=navStart;
    $('navPrev').onclick=navPrev;
    $('navNext').onclick=navNext;
    $('navEnd').onclick=navEnd;
    // keyboard nav
    window.addEventListener('keydown', e=>{
      if(e.target.tagName==='INPUT') return;
      if(e.key==='ArrowLeft') navPrev();
      else if(e.key==='ArrowRight') navNext();
      else if(e.key==='Home') navStart();
      else if(e.key==='End') navEnd();
      else if(e.key==='f') flip();
    });
    window.addEventListener('resize', ()=>{ if(analysisData) drawEvalGraph(analysisData.evals); });
  }

  // ============= INIT =============
  function init(){
    buildBoard();
    renderLive();
    bindEvents();
    setStatus('Choose a mode to begin.');
    // default: preselect computer options visible
    $('computerOpts').style.display='flex';
    document.querySelector('.mode-btn[data-mode="computer"]').style.borderColor='var(--accent)';
  }

  return {init};
})();

document.addEventListener('DOMContentLoaded', App.init);





</script>
</body>
</html>
